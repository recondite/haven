<!DOCTYPE html>
<!-- Haven — Command Center (production UI)
  Synthesis of the mockup competition:
  - Shell + visual system from option-c.html (sidebar / grouped list / detail pane, #0d1117 + #5e6ad2)
  - Keyboard model + row density from option-a.html (j/k, e/s/S/c/d, a/r, n/h, 1-4, persistent keymap bar)
  - "Why now" line from option-b.html (derived honestly from real payload fields only)
  All data comes from the live Haven API. No hardcoded items.
  Previous UI preserved at /legacy.html
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Haven — Command Center</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235e6ad2'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='18' fill='white'%3EH%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0d1117; --bg2:#0a0d12; --panel:#151a23; --panel-2:#1c2230; --raise:#232a3a;
    --text:#e8ecf4; --text-2:#b7bfd0; --muted:#7d8699; --faint:#565f72;
    --accent:#5e6ad2; --accent-2:#7681e4; --accent-dim:rgba(94,106,210,.14);
    --ok:#3fb950; --ok-dim:rgba(63,185,80,.13);
    --warn:#d29922; --warn-dim:rgba(210,153,34,.13);
    --err:#f85149; --err-dim:rgba(248,81,73,.12);
    --info:#58a6ff; --info-dim:rgba(88,166,255,.12);
    --purple:#bc8cff; --purple-dim:rgba(188,140,255,.12);
    --border:#232a38; --border-2:#2c3446;
    --mono:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box} [hidden]{display:none!important}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);font-size:13px;background:var(--bg);color:var(--text);overflow:hidden}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2b3243;border-radius:6px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-track{background:transparent}
  button{font-family:inherit}
  a{color:var(--accent-2)}

  .shell{display:flex;flex-direction:column;height:100vh}
  .app{display:grid;grid-template-columns:224px 1fr;flex:1;min-height:0}

  /* ============ SIDEBAR ============ */
  .sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:9px;padding:14px 14px 12px;flex:none}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#8a5ed2);display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;flex:none}
  .brand .name{font-weight:700;font-size:14px;letter-spacing:-.01em}
  .brand .env{margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--warn);background:var(--warn-dim);border:1px solid rgba(210,153,34,.35);padding:2px 6px;border-radius:99px}
  .brand .env.live{color:var(--ok);background:var(--ok-dim);border-color:rgba(63,185,80,.35)}
  .nav{padding:4px 8px;display:flex;flex-direction:column;gap:1px;flex:none}
  .nav-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:14px 8px 5px;flex:none}
  .nav-item{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:6px;color:var(--text-2);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:13px;line-height:1.3}
  .nav-item:hover{background:var(--panel);color:var(--text)}
  .nav-item.active{background:var(--accent-dim);color:var(--text)}
  .nav-item.active .ni-icon{color:var(--accent-2)}
  .ni-icon{width:16px;height:16px;flex:none;color:var(--muted);display:grid;place-items:center}
  .ni-icon svg{width:15px;height:15px}
  .nav-item .badge{margin-left:auto;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--muted);background:var(--panel-2);border-radius:99px;padding:1px 7px}
  .nav-item .badge.hot{color:#fff;background:var(--accent)}
  .nav-item .badge.amber{color:#0d1117;background:var(--warn)}
  .nav-item.soon{opacity:.45;cursor:default}
  .nav-item .soon-tag{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--faint);border:1px solid var(--border-2);border-radius:4px;padding:1px 5px}

  .side-section{padding:6px 16px 2px;flex:none}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;color:var(--text-2);font-size:12.5px}
  .switch{width:28px;height:16px;border-radius:99px;background:var(--raise);position:relative;cursor:pointer;border:none;flex:none;transition:background .15s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#98a0b3;transition:transform .15s,background .15s}
  .switch.on{background:var(--accent)}
  .switch.on::after{transform:translateX(12px);background:#fff}
  .watchlist{display:flex;flex-wrap:wrap;gap:5px;padding:6px 0 4px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);background:var(--panel);border:1px solid var(--border-2);border-radius:99px;padding:2.5px 8px}
  .chip .x{cursor:pointer;color:var(--faint);font-size:12px;line-height:1}
  .chip .x:hover{color:var(--err)}
  .chip-add{display:inline-flex;align-items:center;font-size:11px;color:var(--muted);background:none;border:1px dashed var(--border-2);border-radius:99px;padding:2.5px 9px;cursor:pointer}
  .chip-add:hover{color:var(--accent-2);border-color:var(--accent)}

  .side-foot{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex:none}
  .foot-row{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted)}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(63,185,80,.5);animation:pulse 2.2s infinite;flex:none}
  .live-dot.dead{background:var(--err);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.45)}70%{box-shadow:0 0 0 6px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

  /* ============ MAIN COLUMN ============ */
  .main{display:flex;flex-direction:column;min-width:0;min-height:0}
  .topbar{display:flex;align-items:center;gap:14px;padding:0 18px;height:50px;border-bottom:1px solid var(--border);background:var(--bg);flex:none}
  .view-title{font-size:14.5px;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
  .view-sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}
  .top-counts{display:flex;gap:4px;margin-left:6px}
  .count-pill{display:inline-flex;align-items:baseline;gap:5px;font-size:11px;color:var(--muted);padding:3px 8px;border-radius:6px;cursor:default}
  .count-pill b{font-size:12.5px;font-variant-numeric:tabular-nums;color:var(--text)}
  .count-pill.ar b{color:var(--err)} .count-pill.appr b{color:var(--warn)} .count-pill.reply b{color:var(--info)} .count-pill.watch b{color:var(--purple)}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .src-pills{display:flex;gap:4px}
  .src-pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--text-2);background:var(--panel);border:1px solid var(--border);border-radius:99px;padding:3px 9px}
  .src-pill .d{width:6px;height:6px;border-radius:50%;background:var(--ok);flex:none}
  .src-pill.down .d{background:var(--err)}
  .src-pill.down{color:var(--err);border-color:rgba(248,81,73,.4)}
  .src-pill.soon{opacity:.45}
  .src-pill.soon .d{background:var(--faint)}

  .content{display:grid;grid-template-columns:minmax(0,1fr) 400px;min-height:0;flex:1}
  .content.single{grid-template-columns:minmax(0,1fr)}
  .list-pane{overflow-y:auto;min-height:0;border-right:1px solid var(--border)}
  .content.single .list-pane{border-right:none}
  .detail-pane{overflow-y:auto;min-height:0;background:var(--bg2)}

  /* ============ LIST (Option A density: single-line compact rows) ============ */
  .group-hd{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:7px 18px 5px;font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);background:linear-gradient(var(--bg) 82%,rgba(13,17,23,0))}
  .group-hd .gcount{font-variant-numeric:tabular-nums;color:var(--faint);font-weight:600;letter-spacing:0}
  .group-hd .gdot{width:7px;height:7px;border-radius:2px;flex:none}
  .row{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 13px;min-height:33px;cursor:pointer;border-left:3px solid transparent;position:relative}
  .row:hover{background:var(--panel)}
  .row.sel{background:var(--accent-dim);border-left-color:var(--accent)}
  .row.handled{opacity:.5}
  .row .ubar{position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:2px}
  .u-urgent .ubar{background:var(--err)} .u-high .ubar{background:var(--warn)} .u-med .ubar{background:var(--info)} .u-low .ubar{background:var(--faint)}
  .src-glyph{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-size:9px;font-weight:800;flex:none;letter-spacing:.02em}
  .sg-gmail{background:var(--err-dim);color:#ff8f88} .sg-slack{background:var(--purple-dim);color:var(--purple)}
  .sg-freshservice{background:var(--ok-dim);color:#6fd382} .sg-otter{background:var(--info-dim);color:#79b8ff}
  .row-sender{font-weight:600;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none;max-width:148px}
  .row-subj{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .row-subj .snip{color:var(--muted)}
  .tag{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:4px;padding:1px 5px;flex:none}
  .tag-approval{background:var(--warn-dim);color:var(--warn)} .tag-action{background:var(--err-dim);color:#ff8f88}
  .tag-fyi{background:var(--info-dim);color:#79b8ff} .tag-travel{background:var(--purple-dim);color:var(--purple)}
  .tag-noise{background:var(--panel-2);color:var(--faint)} .tag-other{background:var(--panel-2);color:var(--muted)}
  .wflag{color:var(--purple);font-size:10px;flex:none}
  .lnflag{font-family:var(--mono);font-size:9px;color:var(--accent-2);background:var(--accent-dim);border-radius:4px;padding:1px 4px;flex:none}
  .row-time{font-size:10.5px;color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap;flex:none;min-width:30px;text-align:right}
  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-size:28px;margin-bottom:8px}

  /* ============ DETAIL PANE ============ */
  .dp{padding:18px 20px 30px}
  .dp-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .dp-subject{font-size:15px;font-weight:700;line-height:1.35;letter-spacing:-.01em;margin:0 0 4px;overflow-wrap:anywhere}
  .dp-meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .dp-meta b{color:var(--text-2);font-weight:600}
  .why{display:flex;gap:8px;align-items:baseline;font-size:12px;color:var(--text-2);background:var(--accent-dim);border:1px solid rgba(94,106,210,.3);border-radius:7px;padding:7px 10px;margin-bottom:12px;line-height:1.45}
  .why .k{color:var(--accent-2);font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-size:10px;white-space:nowrap;flex:none}
  .kv{display:grid;grid-template-columns:92px 1fr;gap:5px 12px;font-size:12px;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px}
  .kv .k{color:var(--faint)} .kv .v{color:var(--text-2);overflow-wrap:anywhere}
  .dp-body{font-size:12.8px;line-height:1.6;color:var(--text-2);white-space:pre-wrap;overflow-wrap:anywhere;margin-bottom:18px}
  .dp-actions{display:flex;flex-wrap:wrap;gap:7px}
  .btn{border:none;border-radius:7px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1.2;text-decoration:none}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:var(--accent);color:#fff} .btn-primary:hover:not(:disabled){background:var(--accent-2)}
  .btn-ok{background:var(--ok);color:#04120a} .btn-ok:hover:not(:disabled){filter:brightness(1.12)}
  .btn-danger{background:var(--err-dim);color:var(--err);border:1px solid rgba(248,81,73,.4)} .btn-danger:hover:not(:disabled){background:rgba(248,81,73,.22)}
  .btn-ghost{background:var(--panel-2);color:var(--text-2);border:1px solid var(--border-2)} .btn-ghost:hover:not(:disabled){background:var(--raise);color:var(--text)}
  .dp-placeholder{padding:70px 26px;text-align:center;color:var(--faint);font-size:12.5px;line-height:2}
  .dp-placeholder .k{display:inline-block;border:1px solid var(--border-2);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:10.5px;color:var(--muted);background:var(--panel)}
  .sec-title{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px}
  .sum-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:12.2px;line-height:1.55;color:var(--text-2);margin-bottom:12px}
  .sum-box .lb{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}

  /* ============ APPROVALS ============ */
  .dryrun{display:flex;align-items:center;gap:10px;background:var(--warn-dim);border-bottom:1px solid rgba(210,153,34,.4);color:var(--warn);padding:8px 18px;font-size:12px;font-weight:600;flex:none;flex-wrap:wrap}
  .dryrun .dr-badge{font-size:9.5px;font-weight:800;letter-spacing:.1em;background:var(--warn);color:#1a1405;border-radius:4px;padding:2px 7px;flex:none}
  .dryrun .dr-note{color:rgba(210,170,80,.85);font-weight:500}
  .appr-card{margin:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--panel);cursor:pointer;padding:12px 14px}
  .appr-card:hover{border-color:var(--border-2)}
  .appr-card.sel{border-color:var(--accent);background:var(--accent-dim)}
  .appr-l1{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .appr-to{font-weight:650;font-size:12.5px;overflow-wrap:anywhere}
  .appr-via{font-size:10.5px;color:var(--muted)}
  .appr-time{margin-left:auto;font-size:10.5px;color:var(--faint);font-variant-numeric:tabular-nums;flex:none}
  .appr-preview{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .draft-box{background:var(--panel);border:1px solid var(--border-2);border-radius:9px;padding:13px 14px;font-size:12.6px;line-height:1.65;color:var(--text);white-space:pre-wrap;overflow-wrap:anywhere;margin-bottom:6px}
  .draft-tools{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:11px;color:var(--faint)}
  .evi{border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;background:var(--panel)}
  .evi-l1{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--text-2);flex-wrap:wrap}
  .evi-cite{font-family:var(--mono);font-size:9.5px;color:var(--accent-2);background:var(--accent-dim);border-radius:4px;padding:1px 5px;flex:none;overflow-wrap:anywhere}
  .evi-q{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:4px;border-left:2px solid var(--border-2);padding-left:8px;white-space:pre-wrap;overflow-wrap:anywhere}

  /* ============ SYSTEM ============ */
  .sys-wrap{padding:18px;overflow-y:auto}
  .sys-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:8px}
  .sys-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 15px}
  .sys-card.down{border-color:rgba(248,81,73,.45)}
  .sys-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .sys-hd .nm{font-weight:700;font-size:13px}
  .sys-hd .st{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.06em;border-radius:99px;padding:2px 8px}
  .st-ok{background:var(--ok-dim);color:var(--ok)} .st-down{background:var(--err-dim);color:var(--err)} .st-off{background:var(--panel-2);color:var(--faint)}
  .st-warn{background:var(--warn-dim);color:var(--warn)}
  .sys-kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:11.5px}
  .sys-kv .k{color:var(--faint)} .sys-kv .v{color:var(--text-2);text-align:right;font-variant-numeric:tabular-nums;overflow-wrap:anywhere}
  .sys-kv .v.err{color:var(--err)}

  /* ============ KEYMAP BAR (Option A) ============ */
  #keymap{flex:none;height:26px;display:flex;align-items:center;gap:2px;padding:0 10px;background:var(--bg2);border-top:1px solid var(--border);overflow:hidden;white-space:nowrap}
  #keymap .km{display:flex;align-items:center;gap:5px;padding:0 9px;border-right:1px solid var(--border);height:15px}
  #keymap .km:last-child{border-right:none}
  #keymap kbd{font-family:var(--mono);font-size:9.5px;color:var(--text-2);background:var(--panel-2);border:1px solid var(--border-2);border-radius:4px;padding:0 4px;line-height:14px}
  #keymap .lbl{color:var(--faint);font-size:10px;letter-spacing:.5px}

  @media (max-width:1360px){ .view-sub{display:none} }
  @media (max-width:1180px){ .content{grid-template-columns:minmax(0,1fr) 360px} .top-counts .count-pill:not(.ar):not(.appr){display:none} }
  @media (max-width:980px){
    .app{grid-template-columns:190px 1fr}
    .content{grid-template-columns:minmax(0,46%) minmax(0,54%)}
    .src-pills .src-pill{padding:3px 6px;font-size:0} .src-pills .src-pill .d{margin:0}
    .row-sender{max-width:100px}
  }
  .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(calc(100% + 60px));background:var(--raise);border:1px solid var(--border-2);color:var(--text);font-size:12.5px;font-weight:600;border-radius:9px;padding:9px 16px;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .22s ease,visibility 0s .22s;z-index:99;max-width:70vw;visibility:hidden}
  .toast.show{transform:translateX(-50%) translateY(0);visibility:visible;transition:transform .22s ease}
  .toast.err{border-color:rgba(248,81,73,.5);color:#ffb3ae}
</style>
</head>
<body>
<div class="shell">
<div class="app">

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">H</div><div class="name">Haven</div>
      <span class="env" id="env-badge" hidden>DRY-RUN</span>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-view="inbox">
        <span class="ni-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 9.5h3.2l1 2h4.6l1-2h3.2M2.6 3.5h10.8l1.1 6v3a1 1 0 0 1-1 1H2.5a1 1 0 0 1-1-1v-3l1.1-6z"/></svg></span>
        Inbox <span class="badge hot" id="badge-inbox">–</span>
      </button>
      <button class="nav-item" data-view="approvals">
        <span class="ni-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.8l5.5 2.4v3.4c0 3.2-2.3 5.6-5.5 6.6-3.2-1-5.5-3.4-5.5-6.6V4.2L8 1.8z"/><path d="M5.6 8l1.7 1.7L10.6 6.4"/></svg></span>
        Approvals <span class="badge amber" id="badge-appr">–</span>
      </button>
      <button class="nav-item" data-view="people">
        <span class="ni-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.7" cy="5.4" r="2.4"/><path d="M1.6 13.4c.5-2.3 2.1-3.6 4.1-3.6s3.6 1.3 4.1 3.6"/><circle cx="11.5" cy="5.8" r="1.9"/><path d="M11 9.9c1.8.1 3 1.2 3.4 3"/></svg></span>
        People
      </button>
      <button class="nav-item" data-view="system">
        <span class="ni-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 8h3l1.5-4 2.5 8 1.5-4h4.5"/></svg></span>
        System
      </button>
      <button class="nav-item soon" title="Ships in Phase 2">
        <span class="ni-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg></span>
        JIRA <span class="soon-tag">SOON</span>
      </button>
    </nav>

    <div class="nav-label" style="padding-left:16px">Filters</div>
    <div class="side-section">
      <div class="toggle-row">Hide noise <button class="switch on" id="sw-noise"></button></div>
      <div class="toggle-row">Hide handled <button class="switch on" id="sw-handled"></button></div>
    </div>

    <div class="nav-label" style="padding-left:16px">Watchlist</div>
    <div class="side-section">
      <div class="watchlist" id="watchlist"><button class="chip-add" id="chip-add">+ add</button></div>
    </div>

    <div class="side-foot">
      <div class="foot-row"><span class="live-dot dead" id="live-dot"></span> <span id="live-txt">SSE connecting…</span></div>
      <div class="foot-row"><span id="foot-counts">—</span></div>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="view-title" id="view-title">Inbox</div>
        <div class="view-sub" id="view-sub">Action required across all sources</div>
      </div>
      <div class="top-counts">
        <span class="count-pill ar" title="Action required"><b id="cnt-ar">–</b> AR</span>
        <span class="count-pill appr" title="Pending draft approvals"><b id="cnt-appr">–</b> Approvals</span>
        <span class="count-pill reply" title="Reply needed"><b id="cnt-reply">–</b> Reply</span>
        <span class="count-pill watch" title="Watchlist matches"><b id="cnt-watch">–</b> Watch</span>
      </div>
      <div class="top-right">
        <div class="src-pills" id="src-pills"></div>
      </div>
    </div>

    <div class="dryrun" id="dryrun-banner" hidden>
      <span class="dr-badge">DRY-RUN</span>
      Outbound sends are simulated — Approve logs the send, nothing leaves Haven.
      <span class="dr-note">Flip send mode in .env to go live.</span>
    </div>

    <div class="content" id="content">
      <div class="list-pane" id="list-pane"></div>
      <div class="detail-pane" id="detail-pane"></div>
    </div>
  </div>
</div>

<!-- ===== KEYMAP BAR ===== -->
<div id="keymap"></div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
/* ===================== API HELPER =====================
   Single place to add an Authorization header later. */
const AUTH_TOKEN = '';   // e.g. 'Bearer <token>' — added to every call when set
async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  if (AUTH_TOKEN) headers['Authorization'] = AUTH_TOKEN;
  const res = await fetch(path, Object.assign({}, opts, { headers }));
  if (!res.ok) {
    let msg = '';
    try { msg = (await res.json()).detail || ''; } catch (_) {}
    throw new Error(msg || (res.status + ' ' + res.statusText));
  }
  return res.json();
}

/* ===================== STATE ===================== */
const SOURCES = ['gmail', 'slack', 'freshservice', 'otter'];
const SRC = {
  gmail:        { g: 'GM', label: 'Gmail' },
  slack:        { g: 'SL', label: 'Slack' },
  freshservice: { g: 'FS', label: 'Freshservice' },
  otter:        { g: 'OT', label: 'Otter.ai' },
};
const state = {
  view: 'inbox',
  items: { gmail: [], slack: [], freshservice: [], otter: [] },   // normalized
  loaded: { gmail: false, slack: false, freshservice: false, otter: false },
  approvals: { drafts: [], dry_run: false },
  auth: {},              // source -> status payload (or {error})
  watchlist: [],
  llm: null, health: null,
  hideNoise: true, hideHandled: true,
  selKey: null,          // inbox selection: "source|msg_id"
  selDraft: null,        // approvals selection: draft id
  sse: { live: false, lastEvent: 0 },
};

/* ===================== HELPERS ===================== */
const $ = s => document.querySelector(s);
const esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
function toast(msg, isErr) {
  const t = $('#toast');
  t.textContent = msg; t.classList.toggle('err', !!isErr); t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), isErr ? 4000 : 2200);
}
function glyph(k) {
  const s = SRC[k] || { g: '??', label: k };
  return `<span class="src-glyph sg-${esc(k)}" title="${esc(s.label)}">${s.g}</span>`;
}
function nowS() { return Date.now() / 1000; }
function itemTs(raw) {
  const t = Date.parse(raw.date || '');
  if (!isNaN(t) && t > 0) return t / 1000;
  return Number(raw.cached_at) || 0;
}
function age(ts) {
  if (!ts) return '';
  const d = Math.max(0, nowS() - ts);
  if (d < 3600) return Math.max(1, Math.round(d / 60)) + 'm';
  if (d < 86400) return Math.round(d / 3600) + 'h';
  return Math.round(d / 86400) + 'd';
}
function fmtEpoch(sec) {
  if (!sec) return '—';
  return new Date(sec * 1000).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
const URG_ORDER = ['urgent', 'high', 'med', 'low'];
function normUrg(u) {
  u = String(u || '').toLowerCase();
  if (u === 'medium') u = 'med';
  return URG_ORDER.includes(u) ? u : 'low';
}
const KNOWN_TAGS = ['approval', 'action', 'fyi', 'travel', 'noise'];
function normalize(source, raw) {
  return {
    source,
    id: raw.msg_id,
    key: source + '|' + raw.msg_id,
    sender: raw.sender_name || raw.sender || raw.sender_email || raw.channel_name || SRC[source].label,
    subject: raw.subject || raw.summary || raw.snippet || '(no subject)',
    snippet: raw.snippet || raw.summary || '',
    tag: String(raw.tag || '').toLowerCase(),
    urg: normUrg(raw.urgency),
    ts: itemTs(raw),
    raw,
  };
}
function tagClass(tag) { return KNOWN_TAGS.includes(tag) ? 'tag-' + tag : 'tag-other'; }

function allItems() {
  return SOURCES.flatMap(s => state.items[s]);
}
function isSnoozed(it) { return Number(it.raw.snooze_until || 0) > nowS(); }
function visibleItems() {
  return allItems().filter(it =>
    !isSnoozed(it)
    && !(state.hideNoise && it.tag === 'noise')
    && !(state.hideHandled && it.raw.handled_at)
  );
}
function orderedVisible() {
  const v = visibleItems();
  const out = [];
  for (const u of URG_ORDER) out.push(...v.filter(i => i.urg === u).sort((a, b) => b.ts - a.ts));
  return out;
}
function findItem(key) { return allItems().find(i => i.key === key) || null; }
function selectedItem() { return state.selKey ? findItem(state.selKey) : null; }

/* Option B's "Why now" — derived from real payload fields only. Empty → omitted. */
function whyNow(it) {
  const r = it.raw, parts = [];
  if (r.watchlist_match) parts.push('watchlist hit: "' + r.watchlist_match + '"');
  if (r.is_priority_approval) parts.push('blocks spend — approval chain stops at you');
  if (r.is_elt) parts.push('ELT sender');
  else if (r.is_team) parts.push('team sender');
  if (r.sla_breached) parts.push('SLA breached');
  else if (r.sla_at_risk) parts.push('SLA at risk');
  if (r.reply_needed) parts.push(r.reply_reason ? r.reply_reason : 'reply needed — you own the next turn');
  if (!parts.length && r.tag === 'approval') parts.push('tagged approval · urgency ' + it.urg);
  return parts.slice(0, 3).join(' · ');
}

/* ===================== DATA FETCH ===================== */
async function fetchItems(source) {
  try {
    const data = await api(`/api/agents/${source}/items`);
    state.items[source] = (data.items || []).map(r => normalize(source, r));
    state.loaded[source] = true;
  } catch (e) {
    state.loaded[source] = true;
    console.warn(`fetch ${source} items failed:`, e.message);
  }
}
async function fetchApprovals() {
  try {
    state.approvals = await api('/api/approvals');
  } catch (e) { console.warn('approvals fetch failed:', e.message); }
}
async function fetchAuth() {
  await Promise.all(SOURCES.map(async s => {
    try { state.auth[s] = await api(`/api/auth/${s}/status`); }
    catch (e) { state.auth[s] = { authed: false, error: e.message }; }
  }));
}
async function fetchWatchlist() {
  try { state.watchlist = (await api('/api/agents/gmail/watchlist')).keywords || []; }
  catch (e) { console.warn('watchlist fetch failed:', e.message); }
}
async function fetchMeta() {
  try { state.health = await api('/api/health'); } catch (e) { state.health = { status: 'error', error: e.message }; }
  try { state.llm = await api('/api/llm/status'); } catch (e) { state.llm = null; }
}

/* Debounced per-source refetch, driven by SSE events. */
const _refetchTimers = {};
function scheduleRefetch(source) {
  clearTimeout(_refetchTimers[source]);
  _refetchTimers[source] = setTimeout(async () => {
    await fetchItems(source);
    render();
  }, 400);
}

/* ===================== NAV / CHROME ===================== */
const VIEWMETA = {
  inbox: ['Inbox', 'Action required across all sources'],
  approvals: ['Approvals', 'Agent-drafted replies awaiting your review — one approval, one send'],
  people: ['People', 'Per-person rollup: open work + requests to you'],
  system: ['System', 'Source health, auth, LLM runtime and send mode'],
};
const VIEW_KEYS = ['inbox', 'approvals', 'people', 'system'];
document.querySelectorAll('.nav-item[data-view]').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));
function setView(v) {
  state.view = v;
  document.querySelectorAll('.nav-item[data-view]').forEach(n => n.classList.toggle('active', n.dataset.view === v));
  render();
}

$('#sw-noise').addEventListener('click', () => toggleFilter('noise'));
$('#sw-handled').addEventListener('click', () => toggleFilter('handled'));
function toggleFilter(which) {
  if (which === 'noise') state.hideNoise = !state.hideNoise;
  else state.hideHandled = !state.hideHandled;
  $('#sw-noise').classList.toggle('on', state.hideNoise);
  $('#sw-handled').classList.toggle('on', state.hideHandled);
  toast(which === 'noise' ? (state.hideNoise ? 'Hiding noise' : 'Showing noise')
                          : (state.hideHandled ? 'Hiding handled' : 'Showing handled'));
  render();
}

/* Watchlist chips (wired to the gmail watchlist API) */
function renderWatchlist() {
  const w = $('#watchlist');
  w.innerHTML = state.watchlist.map(k =>
    `<span class="chip">${esc(k)} <span class="x" data-kw="${esc(k)}" title="Remove">×</span></span>`
  ).join('') + '<button class="chip-add" id="chip-add">+ add</button>';
  w.querySelectorAll('.x').forEach(x => x.addEventListener('click', async () => {
    const kw = x.dataset.kw;
    try {
      const r = await api(`/api/agents/gmail/watchlist/${encodeURIComponent(kw)}`, { method: 'DELETE' });
      state.watchlist = r.keywords || [];
      renderWatchlist(); toast(`Removed "${kw}" from watchlist`);
    } catch (e) { toast('Remove failed: ' + e.message, true); }
  }));
  $('#chip-add').addEventListener('click', async () => {
    const kw = prompt('Watchlist keyword:');
    if (!kw || !kw.trim()) return;
    try {
      const r = await api('/api/agents/gmail/watchlist', { method: 'POST', body: JSON.stringify({ keyword: kw.trim() }) });
      state.watchlist = r.keywords || [];
      renderWatchlist(); toast(`Watching "${kw.trim()}"`);
    } catch (e) { toast('Add failed: ' + e.message, true); }
  });
}

function renderChrome() {
  const [t, s] = VIEWMETA[state.view];
  $('#view-title').textContent = t; $('#view-sub').textContent = s;
  $('#dryrun-banner').hidden = !(state.view === 'approvals' && state.approvals.dry_run);
  $('#content').classList.toggle('single', state.view === 'system' || state.view === 'people');

  // badges + counts
  const vis = visibleItems();
  $('#badge-inbox').textContent = vis.length;
  $('#badge-inbox').classList.toggle('hot', vis.length > 0);
  const pend = state.approvals.drafts.length;
  $('#badge-appr').textContent = pend;
  $('#badge-appr').classList.toggle('amber', pend > 0);
  $('#cnt-ar').textContent = vis.filter(i => i.raw.action_required).length;
  $('#cnt-appr').textContent = pend;
  $('#cnt-reply').textContent = vis.filter(i => i.raw.reply_needed).length;
  $('#cnt-watch').textContent = vis.filter(i => i.raw.watchlist_match).length;

  // env badge (dry-run vs live)
  const env = $('#env-badge');
  env.hidden = false;
  env.textContent = state.approvals.dry_run ? 'DRY-RUN' : 'LIVE';
  env.classList.toggle('live', !state.approvals.dry_run);

  // source pills
  $('#src-pills').innerHTML = SOURCES.map(s2 => {
    const a = state.auth[s2];
    const ok = a && a.authed;
    return `<span class="src-pill ${ok ? '' : 'down'}" title="${esc(SRC[s2].label)} — ${ok ? 'authorized' : 'not authorized'}"><span class="d"></span>${esc(SRC[s2].label)}</span>`;
  }).join('') + `<span class="src-pill soon"><span class="d"></span>JIRA</span>`;

  // footer counts
  const total = allItems().length;
  $('#foot-counts').textContent = `${total} cached · ${vis.length} shown · ${pend} drafts pending`;

  renderKeymap();
}

/* ===================== KEYMAP BAR ===================== */
function km(keys, lbl) {
  return `<span class="km">${keys.map(k => `<kbd>${esc(k)}</kbd>`).join('')}<span class="lbl">${esc(lbl)}</span></span>`;
}
function renderKeymap() {
  let h = '';
  if (state.view === 'inbox') {
    h = km(['j', 'k'], 'navigate') + km(['e'], 'done') + km(['s'], 'snooze 1h') + km(['S'], 'snooze tmrw')
      + km(['c'], '→ linear') + km(['d'], 'draft reply') + km(['n', 'h'], 'noise / handled') + km(['1–4'], 'views');
  } else if (state.view === 'approvals') {
    h = km(['j', 'k'], 'navigate') + km(['a'], 'approve') + km(['r'], 'reject') + km(['1–4'], 'views');
  } else {
    h = km(['1–4'], 'views');
  }
  $('#keymap').innerHTML = h;
}

/* ===================== RENDER ===================== */
function render() {
  renderChrome();
  if (state.view === 'inbox') renderInbox();
  else if (state.view === 'approvals') renderApprovals();
  else if (state.view === 'people') renderPeople();
  else renderSystem();
}

/* ---------- INBOX ---------- */
const GROUPS = [
  { key: 'urgent', label: 'Urgent', dot: 'var(--err)' },
  { key: 'high', label: 'High', dot: 'var(--warn)' },
  { key: 'med', label: 'Medium', dot: 'var(--info)' },
  { key: 'low', label: 'Low / FYI', dot: 'var(--faint)' },
];
function rowHTML(it) {
  const r = it.raw;
  return `<div class="row u-${it.urg} ${state.selKey === it.key ? 'sel' : ''} ${r.handled_at ? 'handled' : ''}" data-key="${esc(it.key)}">
    <span class="ubar"></span>${glyph(it.source)}
    <span class="row-sender">${esc(it.sender)}</span>
    <span class="row-subj">${esc(it.subject)}${it.snippet && it.snippet !== it.subject ? ` <span class="snip">— ${esc(it.snippet)}</span>` : ''}</span>
    ${r.watchlist_match ? `<span class="wflag" title="Watchlist: ${esc(r.watchlist_match)}">⚑</span>` : ''}
    ${r.linear_identifier ? `<span class="lnflag" title="Captured to Linear">${esc(r.linear_identifier)}</span>` : ''}
    <span class="tag ${tagClass(it.tag)}">${esc(it.tag || '—')}</span>
    <span class="row-time">${age(it.ts)}</span>
  </div>`;
}
function renderInbox() {
  const vis = visibleItems();
  let h = '';
  for (const g of GROUPS) {
    const items = vis.filter(i => i.urg === g.key).sort((a, b) => b.ts - a.ts);
    if (!items.length) continue;
    h += `<div class="group-hd"><span class="gdot" style="background:${g.dot}"></span>${g.label} <span class="gcount">${items.length}</span></div>`;
    h += items.map(rowHTML).join('');
  }
  if (!h) {
    const anyLoaded = SOURCES.some(s => state.loaded[s]);
    h = anyLoaded
      ? '<div class="empty"><div class="big">✓</div>Inbox zero. Nothing needs you.<br><span style="font-size:11.5px;color:var(--faint)">Adjust the noise / handled filters to see more.</span></div>'
      : '<div class="empty">Loading items…</div>';
  }
  $('#list-pane').innerHTML = h;
  $('#list-pane').querySelectorAll('.row[data-key]').forEach(el =>
    el.addEventListener('click', () => { state.selKey = el.dataset.key; render(); }));
  renderItemDetail();
}
function kvRow(k, v) { return v ? `<span class="k">${esc(k)}</span><span class="v">${v}</span>` : ''; }
function renderItemDetail() {
  const dp = $('#detail-pane');
  const it = selectedItem();
  if (!it || !visibleItems().includes(it)) {
    dp.innerHTML = `<div class="dp-placeholder">Select an item to see full context and actions.<br><br>
      <span class="k">j</span> <span class="k">k</span> navigate &nbsp; <span class="k">e</span> done &nbsp; <span class="k">s</span> snooze &nbsp; <span class="k">c</span> linear &nbsp; <span class="k">d</span> draft</div>`;
    return;
  }
  const r = it.raw, s = SRC[it.source];
  const why = whyNow(it);
  const from = r.sender_email || r.channel_name || r.meeting_title || '';
  const isSlack = it.source === 'slack';
  const canThread = it.source === 'gmail' && r.thread_id;
  const body = r.body_text || r.snippet || '';
  const dl = r.deeplink ? `<a href="${esc(r.deeplink)}" target="_blank" rel="noopener">Open in ${esc(s.label)} ↗</a>` : '';
  const linearV = r.linear_identifier
    ? `<a href="${esc(r.linear_url || '#')}" target="_blank" rel="noopener">${esc(r.linear_identifier)}</a>${r.linear_state ? ' · ' + esc(r.linear_state) : ''}`
    : '';

  dp.innerHTML = `<div class="dp">
    <div class="dp-eyebrow">${glyph(it.source)}<span style="font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.label)}${from ? ' · ' + esc(from) : ''}</span><span class="tag ${tagClass(it.tag)}" style="margin-left:auto">${esc(it.tag || '—')}</span></div>
    <h2 class="dp-subject">${esc(it.subject)}</h2>
    <div class="dp-meta">From <b>${esc(it.sender)}</b> · ${age(it.ts)} ago · urgency <b style="text-transform:capitalize">${esc(it.urg)}</b>${r.handled_at ? ' · <b style="color:var(--ok)">handled</b>' : ''}</div>
    ${why ? `<div class="why"><span class="k">Why now</span><span>${esc(why)}</span></div>` : ''}
    <div class="kv">
      ${kvRow('Source', esc(s.label))}
      ${kvRow('Tag', esc(it.tag || '—'))}
      ${kvRow('Watchlist', r.watchlist_match ? '⚑ ' + esc(r.watchlist_match) : '')}
      ${kvRow('Reply', r.reply_needed ? 'needed' + (r.reply_reason ? ' — ' + esc(r.reply_reason) : '') : '')}
      ${kvRow('Linear', linearV)}
      ${kvRow('Thread', canThread && r.thread_message_count > 1 ? esc(r.thread_message_count + ' messages') : '')}
      ${kvRow('Status', r.status_label ? esc(r.status_label) + (r.priority_label ? ' · ' + esc(r.priority_label) : '') : '')}
      ${kvRow('Due', r.due_by ? esc(new Date(r.due_by).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })) + (r.sla_breached ? ' · <b style="color:var(--err)">SLA breached</b>' : '') : '')}
      ${kvRow('Link', dl)}
    </div>
    ${r.summary && r.summary !== it.subject ? `<div class="sum-box"><div class="lb">LLM summary</div>${esc(r.summary)}</div>` : ''}
    ${r.suggested_action ? `<div class="sum-box"><div class="lb">Suggested action</div>${esc(r.suggested_action)}</div>` : ''}
    ${body ? `<div class="dp-body">${esc(body)}</div>` : ''}
    <div class="dp-actions">
      ${r.handled_at
        ? `<button class="btn btn-ghost" data-act="undone">↩ Unmark done</button>`
        : `<button class="btn btn-ok" data-act="done">✓ Done</button>`}
      ${canThread && !r.handled_at ? `<button class="btn btn-ghost" data-act="done-thread" title="Mark the whole Gmail thread done">✓ Done (thread)</button>` : ''}
      <button class="btn btn-ghost" data-act="snooze1h">Snooze 1h</button>
      <button class="btn btn-ghost" data-act="snoozetmrw">Tomorrow</button>
      ${r.linear_id
        ? `<a class="btn btn-ghost" href="${esc(r.linear_url || '#')}" target="_blank" rel="noopener">▤ Open in Linear</a>
           ${r.linear_closed_at ? '' : `<button class="btn btn-ghost" data-act="linear-close">Close issue</button>`}`
        : `<button class="btn btn-ghost" data-act="linear">▤ Capture to Linear</button>`}
      <button class="btn btn-primary" data-act="draft" ${isSlack ? '' : 'disabled title="Draft agents for this source ship soon — Slack only for now"'}>✎ Draft reply${isSlack ? '' : ' (soon)'}</button>
    </div>
  </div>`;
  dp.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', () => itemAction(it, b.dataset.act)));
}

/* ---------- ITEM ACTIONS (optimistic + API) ---------- */
function pathId(id) { return encodeURIComponent(id); }
async function itemAction(it, act) {
  const r = it.raw, base = `/api/items/${it.source}/${pathId(it.id)}`;
  try {
    if (act === 'done') {
      const prev = r.handled_at; r.handled_at = nowS(); render();          // optimistic
      try { const res = await api(base + '/mark-done', { method: 'POST' }); r.handled_at = res.handled_at; toast('Marked done' + (res.archived_in_source ? ' — archived in Gmail' : '')); }
      catch (e) { r.handled_at = prev; render(); throw e; }
    } else if (act === 'undone') {
      const prev = r.handled_at; delete r.handled_at; render();
      try { await api(base + '/unmark-done', { method: 'POST' }); toast('Unmarked'); }
      catch (e) { r.handled_at = prev; render(); throw e; }
    } else if (act === 'done-thread') {
      const res = await api(`/api/items/gmail/thread/${pathId(r.thread_id)}/mark-done`, { method: 'POST' });
      for (const g of state.items.gmail) if (g.raw.thread_id === r.thread_id) g.raw.handled_at = res.handled_at;
      toast(`Thread done — ${res.count} message${res.count === 1 ? '' : 's'} archived`); render();
    } else if (act === 'snooze1h' || act === 'snoozetmrw') {
      const preset = act === 'snooze1h' ? '1h' : 'tomorrow';
      const prev = r.snooze_until; r.snooze_until = nowS() + 3600; render();  // optimistic hide
      try { const res = await api(base + '/snooze', { method: 'POST', body: JSON.stringify({ preset }) }); r.snooze_until = res.snooze_until; toast(preset === '1h' ? 'Snoozed 1h' : 'Snoozed until tomorrow morning'); }
      catch (e) { r.snooze_until = prev; render(); throw e; }
    } else if (act === 'linear') {
      toast('Creating Linear issue…');
      const res = await api(base + '/linear', { method: 'POST' });
      r.linear_id = res.linear_id; r.linear_url = res.linear_url; r.linear_identifier = res.linear_identifier;
      toast(res.already_created ? `Already captured — ${res.linear_identifier}` : `Captured to Linear → ${res.linear_identifier}`);
      render();
    } else if (act === 'linear-close') {
      const res = await api(base + '/linear/close', { method: 'POST' });
      r.linear_closed_at = res.closed_at; r.linear_state = res.state_name;
      toast(`${res.linear_identifier} → ${res.state_name || 'Done'}`); render();
    } else if (act === 'draft') {
      if (it.source !== 'slack') return;
      toast('Running draft agent…');
      const res = await api('/api/dispatch/run', { method: 'POST', body: JSON.stringify({ source: it.source, msg_id: it.id }) });
      await fetchApprovals();
      toast(`Draft #${res.draft_id} created — review in Approvals`); render();
    }
  } catch (e) { toast(act + ' failed: ' + e.message, true); }
}

/* ---------- APPROVALS ---------- */
function draftTitle(d) {
  return `${d.kind || 'draft'} → ${d.target || '—'}`;
}
function renderApprovals() {
  const drafts = state.approvals.drafts;
  if (state.selDraft == null || !drafts.some(d => d.id === state.selDraft)) state.selDraft = drafts.length ? drafts[0].id : null;
  let h = `<div class="group-hd"><span class="gdot" style="background:var(--warn)"></span>Pending review <span class="gcount">${drafts.length}</span></div>`;
  if (drafts.length) {
    h += drafts.map(d => `<div class="appr-card ${state.selDraft === d.id ? 'sel' : ''}" data-id="${d.id}">
      <div class="appr-l1">${SRC[d.kind] ? glyph(d.kind) : ''}<span class="appr-to">${esc(draftTitle(d))}</span><span class="appr-via">#${d.id}${d.job_id != null ? ' · job ' + d.job_id : ''}</span><span class="appr-time">${esc(d.created_at || '')}</span></div>
      <div class="appr-preview">${esc(d.payload || '')}</div>
    </div>`).join('');
  } else {
    h += '<div class="empty"><div class="big">✓</div>Approval queue clear — no drafts pending.<br><span style="font-size:11.5px;color:var(--faint)">Run "Draft reply" on a Slack item to generate one.</span></div>';
  }
  $('#list-pane').innerHTML = h;
  $('#list-pane').querySelectorAll('.appr-card').forEach(el =>
    el.addEventListener('click', () => { state.selDraft = Number(el.dataset.id); render(); }));
  renderApprDetail();
}
function renderApprDetail() {
  const dp = $('#detail-pane');
  const d = state.approvals.drafts.find(x => x.id === state.selDraft);
  if (!d) { dp.innerHTML = '<div class="dp-placeholder">Select a draft to review its evidence and approve or reject.<br><br><span class="k">a</span> approve &nbsp; <span class="k">r</span> reject</div>'; return; }
  const ev = Array.isArray(d.evidence) ? d.evidence : [];
  dp.innerHTML = `<div class="dp">
    <div class="dp-eyebrow">${SRC[d.kind] ? glyph(d.kind) : ''}<span style="font-size:11.5px;color:var(--muted)">draft #${d.id} · ${esc(d.kind || '')}${d.created_at ? ' · ' + esc(d.created_at) : ''}</span></div>
    <h2 class="dp-subject">${esc(draftTitle(d))}</h2>
    <div class="sec-title">Draft</div>
    <div class="draft-box">${esc(d.payload || '')}</div>
    <div class="draft-tools"><span>1 approval = 1 send · nothing sends without you</span><span>${(d.payload || '').length} chars</span></div>
    <div class="sec-title">Evidence · ${ev.length} cited item${ev.length === 1 ? '' : 's'}</div>
    ${ev.length ? ev.map(e => `<div class="evi"><div class="evi-l1"><span class="evi-cite">${esc(e.msg_id || '')}</span>${SRC[e.source] ? glyph(e.source) : ''}<span>${esc(e.source || '')}</span></div>${e.excerpt ? `<div class="evi-q">${esc(e.excerpt)}</div>` : ''}</div>`).join('')
               : '<div style="font-size:11.5px;color:var(--faint)">No evidence attached to this draft.</div>'}
    <div class="dp-actions" style="margin-top:18px">
      <button class="btn btn-ok" data-appr="approve">✓ Approve${state.approvals.dry_run ? ' (dry-run)' : ' & send'}</button>
      <button class="btn btn-danger" data-appr="reject">✕ Reject</button>
      <button class="btn btn-ghost" disabled title="Draft editing API not built yet">✎ Edit before send — soon</button>
    </div>
    ${state.approvals.dry_run ? '<div style="margin-top:12px;font-size:11px;color:var(--warn)">⚠ DRY-RUN — Approve will log the send without transmitting.</div>' : ''}
  </div>`;
  dp.querySelectorAll('[data-appr]').forEach(b => b.addEventListener('click', () => approvalAction(d.id, b.dataset.appr)));
}
async function approvalAction(id, act) {
  try {
    if (act === 'approve') {
      await api(`/api/approvals/${id}/approve`, { method: 'POST' });
      toast(state.approvals.dry_run ? 'Approved — send simulated (dry-run)' : 'Approved — sent');
    } else {
      const reason = prompt('Reject reason (optional):') || '';
      await api(`/api/approvals/${id}/reject`, { method: 'POST', body: JSON.stringify({ reason }) });
      toast('Rejected — draft discarded, source item kept');
    }
    await fetchApprovals();
    render();
  } catch (e) { toast(act + ' failed: ' + e.message, true); }
}

/* ---------- PEOPLE (stub) ---------- */
function renderPeople() {
  $('#detail-pane').innerHTML = '';
  $('#list-pane').innerHTML = `<div class="empty" style="padding-top:90px">
    <div class="big">◔</div>
    <div style="font-weight:650;color:var(--text-2);margin-bottom:6px">People rollup isn't here yet</div>
    Ships with the JIRA source + person rollup (Phase 2).
  </div>`;
}

/* ---------- SYSTEM ---------- */
function authKV(source) {
  const a = state.auth[source] || {};
  const rows = [];
  for (const [k, v] of Object.entries(a)) {
    if (k === 'authed') continue;
    rows.push(`<span class="k">${esc(k)}</span><span class="v ${k === 'error' ? 'err' : ''}">${esc(String(v))}</span>`);
  }
  return rows.join('');
}
function renderSystem() {
  const pend = state.approvals.drafts.length;
  const h = state.health || {};
  const llm = state.llm;
  const srcCards = SOURCES.map(s => {
    const a = state.auth[s] || {};
    const items = state.items[s];
    const actionable = items.filter(i => i.tag !== 'noise' && !i.raw.handled_at && !isSnoozed(i)).length;
    const handled = items.filter(i => i.raw.handled_at).length;
    return `<div class="sys-card ${a.authed ? '' : 'down'}">
      <div class="sys-hd">${glyph(s)}<span class="nm">${esc(SRC[s].label)}</span>
        <span class="st ${a.authed ? 'st-ok' : 'st-down'}">${a.authed ? 'AUTHORIZED' : 'NO AUTH'}</span></div>
      <div class="sys-kv">
        <span class="k">Cached items</span><span class="v">${items.length}</span>
        <span class="k">Actionable</span><span class="v">${actionable}</span>
        <span class="k">Handled</span><span class="v">${handled}</span>
        ${authKV(s)}
      </div>
      <div style="margin-top:10px"><button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:11.5px;padding:6px" data-poll="${s}">Poll now</button></div>
    </div>`;
  }).join('');
  const jiraCard = `<div class="sys-card"><div class="sys-hd"><span class="nm">JIRA</span><span class="st st-off">SOON</span></div>
    <div class="sys-kv"><span class="k">Status</span><span class="v">Ships in Phase 2</span></div></div>`;

  $('#detail-pane').innerHTML = '';
  $('#list-pane').innerHTML = `<div class="sys-wrap">
    <div class="sec-title" style="margin-top:0">Sources</div>
    <div class="sys-grid">${srcCards}${jiraCard}</div>
    <div class="sec-title">Runtime</div>
    <div class="sys-grid">
      <div class="sys-card"><div class="sys-hd"><span class="nm">Health</span><span class="st ${h.status === 'ok' ? 'st-ok' : 'st-down'}">${esc((h.status || 'unknown').toUpperCase())}</span></div>
        <div class="sys-kv">
          <span class="k">SSE subscribers</span><span class="v">${h.subscribers != null ? h.subscribers : '—'}</span>
          <span class="k">Server time</span><span class="v">${h.ts ? fmtEpoch(h.ts) : '—'}</span>
          <span class="k">SSE (this tab)</span><span class="v ${state.sse.live ? '' : 'err'}">${state.sse.live ? 'connected' : 'disconnected'}</span>
        </div></div>
      <div class="sys-card"><div class="sys-hd"><span class="nm">LLM</span><span class="st ${llm && llm.cli_available ? 'st-ok' : 'st-down'}">${llm ? (llm.cli_available ? 'AVAILABLE' : 'UNAVAILABLE') : 'UNKNOWN'}</span></div>
        <div class="sys-kv">
          <span class="k">Runtime</span><span class="v">${esc(llm ? llm.runtime : '—')}</span>
          <span class="k">Model</span><span class="v">${esc(llm ? llm.model : '—')}</span>
          <span class="k">CLI</span><span class="v">${llm && llm.cli_available ? 'found' : 'missing'}</span>
          ${llm && llm.cli_path ? `<span class="k">Path</span><span class="v" style="font-family:var(--mono);font-size:10px">${esc(llm.cli_path)}</span>` : ''}
          ${llm && llm.local_base_url ? `<span class="k">Local URL</span><span class="v">${esc(llm.local_base_url)}</span>` : ''}
        </div></div>
      <div class="sys-card"><div class="sys-hd"><span class="nm">Send mode</span><span class="st ${state.approvals.dry_run ? 'st-warn' : 'st-ok'}">${state.approvals.dry_run ? 'DRY-RUN' : 'LIVE'}</span></div>
        <div class="sys-kv">
          <span class="k">Pending drafts</span><span class="v">${pend}</span>
          <span class="k">Guardrail</span><span class="v">1 approval = 1 send</span>
          <span class="k">Behavior</span><span class="v">${state.approvals.dry_run ? 'approve logs, nothing transmits' : 'approve transmits'}</span>
        </div></div>
    </div>
  </div>`;
  $('#list-pane').querySelectorAll('[data-poll]').forEach(b => b.addEventListener('click', async () => {
    const s = b.dataset.poll;
    b.disabled = true; b.textContent = 'Polling…';
    try {
      await api(`/api/agents/${s}/poll`, { method: 'POST' });
      await fetchItems(s);
      toast(`${SRC[s].label} poll complete`);
    } catch (e) { toast(`${SRC[s].label} poll failed: ` + e.message, true); }
    render();
  }));
}

/* ===================== KEYBOARD (Option A model) ===================== */
document.addEventListener('keydown', e => {
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  // view switching
  if (['1', '2', '3', '4'].includes(e.key)) { setView(VIEW_KEYS[Number(e.key) - 1]); e.preventDefault(); return; }

  if (state.view === 'inbox') {
    const order = orderedVisible();
    const idx = order.findIndex(i => i.key === state.selKey);
    const sel = selectedItem();
    if (e.key === 'j' || e.key === 'ArrowDown') { moveSel(order, idx, +1); e.preventDefault(); }
    else if (e.key === 'k' || e.key === 'ArrowUp') { moveSel(order, idx, -1); e.preventDefault(); }
    else if (e.key === 'e' && sel) itemAction(sel, sel.raw.handled_at ? 'undone' : 'done');
    else if (e.key === 's' && sel) itemAction(sel, 'snooze1h');
    else if (e.key === 'S' && sel) itemAction(sel, 'snoozetmrw');
    else if (e.key === 'c' && sel) itemAction(sel, sel.raw.linear_id ? 'linear-close' : 'linear');
    else if (e.key === 'd' && sel) {
      if (sel.source === 'slack') itemAction(sel, 'draft');
      else toast('Draft reply is Slack-only for now — other sources soon');
    }
    else if (e.key === 'n') toggleFilter('noise');
    else if (e.key === 'h') toggleFilter('handled');
  } else if (state.view === 'approvals') {
    const drafts = state.approvals.drafts;
    const idx = drafts.findIndex(d => d.id === state.selDraft);
    if (e.key === 'j' || e.key === 'ArrowDown') { if (drafts.length) { state.selDraft = drafts[Math.min(idx + 1, drafts.length - 1)].id; render(); } e.preventDefault(); }
    else if (e.key === 'k' || e.key === 'ArrowUp') { if (drafts.length) { state.selDraft = drafts[Math.max(idx - 1, 0)].id; render(); } e.preventDefault(); }
    else if (e.key === 'a' && state.selDraft != null) approvalAction(state.selDraft, 'approve');
    else if (e.key === 'r' && state.selDraft != null) approvalAction(state.selDraft, 'reject');
  }
});
function moveSel(order, idx, delta) {
  if (!order.length) return;
  const next = idx < 0 ? order[0] : order[Math.max(0, Math.min(order.length - 1, idx + delta))];
  state.selKey = next.key;
  render();
  const el = $('#list-pane').querySelector(`.row[data-key="${CSS.escape(next.key)}"]`);
  if (el) el.scrollIntoView({ block: 'nearest' });
}

/* ===================== SSE ===================== */
function startSSE() {
  const es = new EventSource('/api/sse/stream');
  es.onopen = () => { state.sse.live = true; updateLive(); };
  es.onerror = () => { state.sse.live = false; updateLive(); };  // EventSource auto-reconnects
  es.addEventListener('heartbeat', () => { state.sse.live = true; state.sse.lastEvent = Date.now(); updateLive(); });
  const SUFFIXES = ['_item', '_handled', '_unhandled', '_snoozed', '_unsnoozed', '_linearized',
    '_linear_closed', '_poll_complete', '_cache_cleared', '_item_archived', '_blocked', '_ignored'];
  for (const s of SOURCES) for (const suf of SUFFIXES) {
    es.addEventListener(s + suf, () => { state.sse.lastEvent = Date.now(); scheduleRefetch(s); });
  }
  es.addEventListener('auth_changed', async () => { await fetchAuth(); render(); });
}
function updateLive() {
  $('#live-dot').classList.toggle('dead', !state.sse.live);
  $('#live-txt').textContent = state.sse.live ? 'Live · SSE connected' : 'SSE disconnected — retrying…';
}
setInterval(() => {  // stale-heartbeat watchdog (server beats every 2s)
  if (state.sse.lastEvent && Date.now() - state.sse.lastEvent > 15000 && state.sse.live) {
    state.sse.live = false; updateLive();
  }
}, 5000);

/* ===================== BOOT ===================== */
async function boot() {
  render();  // paint empty shell immediately
  startSSE();
  await Promise.all([
    ...SOURCES.map(fetchItems),
    fetchApprovals(), fetchAuth(), fetchWatchlist(), fetchMeta(),
  ]);
  renderWatchlist();
  const first = orderedVisible()[0];
  if (first) state.selKey = first.key;
  render();
  // periodic safety refresh for things SSE doesn't cover
  setInterval(async () => {
    await fetchApprovals(); await fetchMeta();
    if (state.view === 'approvals' || state.view === 'system') render(); else renderChrome();
  }, 60000);
}
boot();
</script>
