name: gmail
enabled: true
poll_seconds: 300

# Gmail search query. Multiple list entries run independently and are deduped,
# but space-separated terms within one query are AND'd by Gmail.
# `-label:ignore` keeps anything Garth has tagged "ignore" (via the Ignore button
# in the UI, or by hand in Gmail) out of Haven entirely.
queries:
  - "is:unread is:important in:inbox -label:ignore"
  # Coupa approval requests aren't reliably flagged is:important by Gmail, so the
  # main query misses them. Pull them explicitly — every mail from the Coupa
  # `approvals@` mailbox is an approval asking for Garth's sign-off. Tenant-
  # specific address; update if the Coupa subdomain changes.
  - "from:approvals@ayarlabs.coupahost.com is:unread in:inbox -label:ignore"

# ─── Never-keep (top priority — beats every accept rule) ────
# Patterns here always reject, even from Ayar people. Use for "structural" noise
# that isn't an AR regardless of who sent it: calendar invites, OOO/PTO, password
# resets, receipts/statements. Tuned conservatively to avoid false positives.
never_keep:
  subject_patterns:
    # Calendar invitations / scheduling — Gmail's calendar UI handles these
    - "^Invitation: "
    - "^Updated invitation: "
    - "^Updated event: "
    - "^Accepted: "
    - "^Declined: "
    - "^Tentative: "
    - "^Canceled: "
    - "^Cancelled: "
    - "^Reschedule:? "
    - "^New event: "
    # OOO / PTO / OTO / out-of-office variations — covers all forms regardless of name
    - "^Out of office\\b"
    - "\\bautomatic reply\\b"
    - "\\bauto-?reply\\b"
    # Calendar event subjects of the form "<Name> PTO" / "<Name> OOO" / "<Name> OTO"
    # (with or without "@ <date>" suffix). The negative lookahead avoids matching
    # legit acronyms in unrelated contexts.
    - "\\b[A-Z][\\w'-]* (?:PTO|OOO|OTO)\\b"
    - "\\b(?:PTO|OOO|OTO) @\\b"
    - "^(?:PTO|OOO|OTO)\\b"
    - "\\bon PTO\\b"
    - "\\bgoing OOO\\b"
    # Password resets / account recovery — every variant. If Garth genuinely needs
    # his own password reset he'll go to Gmail directly; this app should never
    # surface password emails for anyone (himself included — they aren't ARs).
    - "\\bPassword Reset\\b"
    - "\\bReset (?:Your )?Password\\b"
    - "\\bForgot (?:Your )?Password\\b"
    - "\\bPassword Recovery\\b"
    - "\\bRecover (?:Your )?Account\\b"
    - "\\bPassword (?:Change|Update|Expir(?:ed|ing|ation))\\b"
    - "\\bAccount (?:Verification|Recovery|Reactivation)\\b"
    - "\\b(?:Verify|Confirm) (?:Your )?(?:Email|Account|Identity)\\b"
    - "\\bMagic Link\\b"
    - "\\bSign-?in (?:Code|Link|Verification)\\b"
    - "\\bOne-?Time (?:Code|Password|Link)\\b"
    # Receipts / billing statements
    - "^Your invoice\\b"
    - "^Receipt for\\b"
    - "^Your .* receipt\\b"
    - "\\bstatement (?:available|ready)\\b"
    # Google Drive sharing notifications — "X shared 'doc' with you", folder
    # shares, and access-request mails. These are never ARs. Subject patterns
    # are a backstop; the real chokepoint is the sender_pattern below (the From
    # is always a drive-shares noreply address). Belt-and-suspenders so a share
    # is dropped even if Google tweaks the wording or the From address.
    - "\\bshared (?:a|an|the|\\d+|') .*with you\\b"
    - "\\bshared '.*' with you\\b"
    - "\\bhas shared\\b.*\\bwith you\\b"
    - "^Invitation to (?:edit|view|comment)\\b"
    - "\\b(?:is )?request(?:ed|ing)? access to\\b"
  # Sender-address patterns (case-insensitive, matched against the full From
  # address). never_keep runs BEFORE the google.com noreply allowlist, so this
  # rejects Drive shares that would otherwise be deferred to the LLM and shown.
  sender_patterns:
    # drive-shares-dm-noreply@google.com, drive-shares-noreply@docs.google.com, etc.
    - "\\bdrive-shares[\\w.+-]*@"

# Garth's own address — used to decide "directly addressed to me" for the
# keep_only_if_direct rule below.
self_email: garth@ayarlabs.com

# ─── Keep only when directly addressed to Garth ────────────
# Senders/domains here are kept ONLY when Garth is a direct To: recipient.
# When he's merely Cc'd, Bcc'd, or on a distribution/thread copy, the item is
# rejected as noise. Built for the IT-helpdesk / Freshservice ticket blasts
# (it-helpdesk@ayarlabs.com, "Ayar Helpdesk"), which CC Garth on every ticket
# thread even when nothing is assigned to him.
# Runs after block/watchlist/label keeps (so those still win) but before the
# generic ayarlabs.com domain accept — otherwise these would be auto-kept just
# for being @ayarlabs.com.
keep_only_if_direct:
  senders:
    - it-helpdesk@ayarlabs.com
    - support@freshservice.com
  domains: []

# ─── Travel (force-keep + tag="travel") ────────────────────
# Airline reservations, hotel confirmations, car rentals, itineraries, e-tickets.
# These almost always arrive from a noreply/notifications address, so without
# this rule they'd be rejected as noise by the reject sender_patterns below and
# never reach the LLM. This rule runs BEFORE never_keep and the reject patterns:
# a match force-accepts the item, flags it is_travel, and the poll pipeline
# pins tag="travel" and applies a Gmail "travel" label.
# Match if the sender domain ends with one of `domains` OR the subject matches
# one of `subject_patterns`. Keep subject patterns specific to avoid false
# positives on generic "reservation"/"confirmation" wording.
travel:
