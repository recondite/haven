name: gmail
enabled: true
poll_seconds: 300

# Gmail search query. Multiple list entries run independently and are deduped,
# but space-separated terms within one query are AND'd by Gmail.
queries:
  - "is:unread is:important in:inbox"

# ─── Never-keep (top priority — beats every accept rule) ────
# Patterns here always reject, even from Ayar people. Use for "structural" noise
# that isn't an AR regardless of who sent it: calendar invites, OOO/PTO, password
# resets, receipts/statements. Tuned conservatively to avoid false positives.
never_keep:
  subject_patterns:
    # Calendar invitations / scheduling — Gmail's calendar UI handles these
    - "^Invitation: "
    - "^Updated invitation: "
    - "^Updated event: "
    - "^Accepted: "
    - "^Declined: "
    - "^Tentative: "
    - "^Canceled: "
    - "^Cancelled: "
    - "^Reschedule:? "
    - "^New event: "
    # OOO / PTO / OTO / out-of-office variations — covers all forms regardless of name
    - "^Out of office\\b"
    - "\\bautomatic reply\\b"
    - "\\bauto-?reply\\b"
    # Calendar event subjects of the form "<Name> PTO" / "<Name> OOO" / "<Name> OTO"
    # (with or without "@ <date>" suffix). The negative lookahead avoids matching
    # legit acronyms in unrelated contexts.
    - "\\b[A-Z][\\w'-]* (?:PTO|OOO|OTO)\\b"
    - "\\b(?:PTO|OOO|OTO) @\\b"
    - "^(?:PTO|OOO|OTO)\\b"
    - "\\bon PTO\\b"
    - "\\bgoing OOO\\b"
    # Password resets / account recovery — every variant. If Garth genuinely needs
    # his own password reset he'll go to Gmail directly; this app should never
    # surface password emails for anyone (himself included — they aren't ARs).
    - "\\bPassword Reset\\b"
    - "\\bReset (?:Your )?Password\\b"
    - "\\bForgot (?:Your )?Password\\b"
    - "\\bPassword Recovery\\b"
    - "\\bRecover (?:Your )?Account\\b"
    - "\\bPassword (?:Change|Update|Expir(?:ed|ing|ation))\\b"
    - "\\bAccount (?:Verification|Recovery|Reactivation)\\b"
    - "\\b(?:Verify|Confirm) (?:Your )?(?:Email|Account|Identity)\\b"
    - "\\bMagic Link\\b"
    - "\\bSign-?in (?:Code|Link|Verification)\\b"
    - "\\bOne-?Time (?:Code|Password|Link)\\b"
    # Receipts / billing statements
    - "^Your invoice\\b"
    - "^Receipt for\\b"
    - "^Your .* receipt\\b"
    - "\\bstatement (?:available|ready)\\b"

# ─── Hard-keep (highest priority) ──────────────────────────
# These bypass the LLM filter and always show. The LLM still scores them
# (so we get tag/urgency/reply_needed) but cannot tag them as "noise".
keep:
  # Gmail label names that auto-accept (case-insensitive). Beats never_keep —
  # anything you've tagged with one of these labels in Gmail is always shown.
  labels:
    - Ayar-ELT
    # Add more here as needed (e.g. "Ayar-Team", "Important-Customers")

  # Domains whose noreply/notifications/alerts senders are NOT auto-rejected by
  # the static reject patterns. Real business actions can come from these
  # automated addresses (Google Drive shares, Calendar invites from Ayar, etc.) —
  # so they bypass the sender-pattern reject and go to the LLM instead, which
  # decides based on body content.
  noreply_allowlist_domains:
    - google.com
    - googleapis.com
    - googlegroups.com
    - docusign.net
    - docusign.com

  domains:
    - ayarlabs.com

  # Garth's executive leadership team — extra urgency boost (auto-bump to >= med).
  elt:
