    - rory.mcinerney@ayarlabs.com
    - sankara.venkateswaran@ayarlabs.com
    - scott@ayarlabs.com
    - vivek.gupta@ayarlabs.com
    - vivek@ayarlabs.com
    - vladimir@ayarlabs.com

  # Garth's direct reports — keep + flag.
  team:
    - adam@ayarlabs.com
    - andrew@ayarlabs.com
    - archie@ayarlabs.com
    - ayarit@ayarlabs.com
