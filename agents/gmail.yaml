    - "\\bschedule change\\b.*\\b(?:flight|trip|itinerary)\\b"
    - "\\b(?:trip|travel|flight|reservation) (?:reminder|update)\\b"
    - "\\byour (?:flight|trip|stay|reservation) (?:is|has|was)\\b"
    - "\\bonline check[- ]?in (?:is )?(?:now )?(?:open|available)\\b"
    - "\\btime to check in\\b"

# ─── Priority approvals (force-keep, always URGENT) ────────
# Approval requests that must always surface as tag="approval", urgency="urgent",
# regardless of LLM judgment. Matched when the sender domain ends with one of
# `domains` AND the subject matches one of `subject_patterns` (the subject gate
# keeps Coupa *status* notices — "PO received", "invoice processed" — out).
# Seeded with Coupa; add DocuSign/NetSuite/etc. here as needed.
urgent_approvals:
  domains:
    - coupahost.com
    - coupa.com
  # Sender mailboxes (local part before @) that ALWAYS mean "approval request",
  # regardless of subject wording — so a Coupa subject-line change can never
  # cause a real approval to be missed. Must also match a domain above.
  approval_senders:
    - approvals
  subject_patterns:
    - "\\bapprov"            # approve / approval / approver / approvals
    - "\\baction required\\b"
    - "\\b(?:requires|need(?:s|ed)?|pending|awaiting) (?:your )?(?:approval|review|sign-?off)\\b"
    - "\\brequisition\\b.*\\bapprov"
    - "\\bpurchase order\\b.*\\bapprov"
    - "\\bexpense report\\b.*\\bapprov"

# ─── Hard-keep (highest priority) ──────────────────────────
# These bypass the LLM filter and always show. The LLM still scores them
# (so we get tag/urgency/reply_needed) but cannot tag them as "noise".
keep:
  # Gmail label names that auto-accept (case-insensitive). Beats never_keep —
  # anything you've tagged with one of these labels in Gmail is always shown.
  labels:
    - Ayar-ELT
    # Add more here as needed (e.g. "Ayar-Team", "Important-Customers")

  # Domains whose noreply/notifications/alerts senders are NOT auto-rejected by
  # the static reject patterns. Real business actions can come from these
  # automated addresses (Google Drive shares, Calendar invites from Ayar, etc.) —
  # so they bypass the sender-pattern reject and go to the LLM instead, which
  # decides based on body content.
  # NOTE: Google Drive *share* notifications are an exception — they're rejected
  # up-front by the never_keep drive-shares sender_pattern, which runs before
  # this allowlist.
  noreply_allowlist_domains:
    - google.com
    - googleapis.com
    - googlegroups.com
    - docusign.net
    - docusign.com

  domains:
    - ayarlabs.com

  # Garth's executive leadership team — extra urgency boost (auto-bump to >= med).
  elt:
    - amelia@ayarlabs.com
    - chen@ayarlabs.com
    - dan@ayarlabs.com
    - garth@ayarlabs.com
    - jesse@ayarlabs.com
    - kristine@ayarlabs.com
