    - mageorge@cresa.com

# ─── Hard-reject (never reaches LLM scoring; saves cost) ────
# Items matched here get tag="noise" set deterministically and are hidden by
# default in the UI. Toggle "hide noise" to inspect.
reject:
  # Sender-localpart patterns (case-insensitive regex). Matched against the local
  # part of the address (everything before @). Anchored on @ so we catch e.g.
  # `okta-alerts@okta.com`, `acme-noreply@acme.com`, `support-billing@vendor.io`.
  sender_patterns:
    - "(?:^|[\\w.+-]*[-_.])(?:noreply|no-reply|donotreply|do-not-reply)@"
    - "(?:^|[\\w.+-]*[-_.])(?:notifications?|notify|notice)@"
    - "(?:^|[\\w.+-]*[-_.])(?:alerts?|alarm)@"
    - "(?:^|[\\w.+-]*[-_.])(?:autonotification|auto-notification|automated)@"
    - "(?:^|[\\w.+-]*[-_.])(?:billing|invoicing|receipts?|statements?)@"
    - "(?:^|[\\w.+-]*[-_.])(?:marketing|newsletter|digest|news|updates?)@"
    - "(?:^|[\\w.+-]*[-_.])(?:bounce|postmaster|mailer-daemon)@"
    - "^email@"
    - "^reply@"

  # Subject prefixes/keywords (case-insensitive)
  subject_patterns:
    # Calendar accept/decline/cancel/tentative
    - "^Accepted: "
    - "^Declined: "
    - "^Tentative: "
    - "^Canceled: "
    - "^Cancelled: "
    - "^Updated invitation: "
    - "^Invitation: "
    # OOO / PTO
    - "^Out of office\\b"
    - "^OOO\\b"
    - "\\bautomatic reply\\b"
    - "\\bauto-reply\\b"
    - "\\bon PTO\\b"
    # Newsletters / digests / marketing
    - "\\bnewsletter\\b"
    - "\\bweekly digest\\b"
    - "\\bdaily digest\\b"
    - "\\bweekly roundup\\b"
    - "\\bmonthly recap\\b"
    # Receipts / statements / billing
    - "^Your invoice\\b"
    - "^Receipt for\\b"
    - "\\bstatement (?:available|ready)\\b"
    - "^Your .* receipt\\b"
    # Event / webinar invites with explicit RSVP/register language — anything
    # ambiguous (or from Ayar people inviting Garth to dinner) goes to LLM.
    - "\\byou'?re invited\\b"
    - "\\bregister (?:now|today)\\b"
    - "\\bregister for\\b.*\\b(?:webinar|workshop|summit|conference)\\b"
    - "^(?:Reminder|Last chance):\\b.*\\b(?:webinar|register|RSVP)\\b"
    # Password reset / account verification (LLM decides if it's for Garth specifically)
    # — handled in scoring prompt, not here, because the body matters.
    # Generic vendor weekly/daily status digests — LLM still gets to call the
    # ones that mention Garth specifically.
    - "\\bweekly (?:roundup|recap)\\b"
    - "\\bdaily summary\\b"

  # Domains that send only automated noise to Garth
  # Note: do NOT add ayarlabs.com or domains that mix automated + real human emails.
  domains: []

# ─── Approved senders auto-grow ────────────────────────────
# When true, any sender Garth has replied to (last_outbound_at is set on the thread)
# is treated as approved on subsequent emails — even if no static rule matches.
auto_approve_replied_senders: true

# When true, any sender of an email Garth has ingested into the wiki is approved.
auto_approve_wiki_senders: true
